# DendriteNet Morality Configuration
# This file is IMMUTABLE to the training process.
# Only a human can edit these rules.

[safety_block]
type = hard_block
description = Block dangerous content patterns
patterns = how to make.*weapon ; synthesize.*explosive ; hack into
active = true

[sensitive_redirect]
type = soft_redirect
description = Redirect medical queries to careful handling branch
patterns = diagnos ; symptom.*disease ; medication.*dosage
redirect_branch = 2
active = true

[low_confidence_gate]
type = confidence_gate
description = Refuse output when confidence is below threshold
min_confidence = 0.3
active = true

[bias_block]
type = hard_block
description = Block discriminatory output patterns
patterns = all .* are .*(stupid|inferior|worthless) ; .* deserve to
active = true
